<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>UV's Movie World · Stream Movies & TV</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0a0712 0%, #03010a 100%);
            min-height: 100vh;
            color: #f0e6ff;
        }

        /* Main Container */
        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 2.5rem;
            gap: 1rem;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-svg {
            width: 48px;
            height: 48px;
            filter: drop-shadow(0 0 8px #c026d3);
        }
        .logo-text {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #e879f9, #a21caf);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .badge {
            background: rgba(192, 38, 211, 0.2);
            border: 1px solid rgba(192, 38, 211, 0.5);
            color: #e879f9;
            padding: 0.3rem 1rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: 500;
        }

        /* Search Bar */
        .search-wrapper {
            margin-bottom: 2rem;
        }
        .search-container {
            display: flex;
            gap: 0.8rem;
            background: rgba(15, 10, 25, 0.7);
            border-radius: 3rem;
            padding: 0.2rem;
            border: 1px solid rgba(192, 38, 211, 0.4);
            transition: all 0.3s ease;
        }
        .search-container:focus-within {
            border-color: #c026d3;
            box-shadow: 0 0 15px rgba(192, 38, 211, 0.4);
        }
        .search-container input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 0.9rem 1.5rem;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        .search-container button {
            background: linear-gradient(95deg, #c026d3, #a21caf);
            border: none;
            padding: 0 1.8rem;
            border-radius: 3rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .search-container button:hover {
            transform: scale(1.02);
            filter: brightness(1.05);
        }

        /* Category Buttons */
        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin: 1.5rem 0 2rem;
        }
        .cat-btn {
            background: rgba(192, 38, 211, 0.15);
            padding: 0.6rem 1.4rem;
            border-radius: 2rem;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
            font-weight: 500;
            border: 1px solid rgba(192, 38, 211, 0.3);
            color: #e9d5ff;
        }
        .cat-btn.active, .cat-btn:hover {
            background: #c026d3;
            color: white;
            border-color: #c026d3;
            box-shadow: 0 0 12px rgba(192, 38, 211, 0.5);
        }

        /* Server Toggle Dropdown */
        .server-selector {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
            background: rgba(15, 10, 25, 0.5);
            padding: 0.8rem 1.2rem;
            border-radius: 3rem;
            width: fit-content;
            border: 1px solid rgba(192, 38, 211, 0.3);
        }
        .server-selector label {
            font-weight: 600;
            color: #e879f9;
        }
        #serverSelect {
            background: rgba(0,0,0,0.6);
            color: white;
            border: 1px solid #c026d3;
            border-radius: 2rem;
            padding: 0.4rem 1rem;
            outline: none;
            cursor: pointer;
            font-size: 0.9rem;
        }

        /* Movie Grid - Infinite Scroll */
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1.8rem;
            margin-top: 1rem;
        }
        .movie-card {
            background: rgba(20, 15, 35, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 1rem;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.25s ease;
            border: 1px solid rgba(192, 38, 211, 0.3);
            position: relative;
        }
        .movie-card:hover {
            transform: translateY(-6px);
            border-color: #c026d3;
            box-shadow: 0 10px 25px -5px rgba(192, 38, 211, 0.4);
        }
        .movie-card img {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
        }
        .movie-card .info {
            padding: 0.8rem;
        }
        .movie-card .info h3 {
            font-size: 0.9rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #f0e6ff;
        }
        .movie-card .info p {
            font-size: 0.75rem;
            color: #c084fc;
            margin-top: 0.3rem;
        }

        /* Player Section */
        .player-section {
            margin-top: 2rem;
            display: none;
        }
        .player-card {
            background: rgba(10, 6, 20, 0.95);
            border-radius: 1.2rem;
            padding: 1.2rem;
            backdrop-filter: blur(12px);
            border: 1px solid #c026d3;
            box-shadow: 0 0 25px rgba(192, 38, 211, 0.3);
        }
        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 1rem;
            gap: 1rem;
        }
        #playerTitle {
            font-size: 1.2rem;
            font-weight: bold;
            color: #e879f9;
        }
        .close-player {
            background: rgba(180, 30, 50, 0.9);
            border: none;
            color: white;
            padding: 0.4rem 1.2rem;
            border-radius: 2rem;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }
        .close-player:hover {
            background: #dc2626;
        }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            border-radius: 0.8rem;
            overflow: hidden;
            background: #000;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .episode-selector {
            margin-bottom: 1.2rem;
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .loading-spinner {
            text-align: center;
            padding: 3rem;
            color: #e879f9;
        }
        footer {
            text-align: center;
            margin-top: 3rem;
            font-size: 0.7rem;
            opacity: 0.6;
            color: #a78bfa;
        }

        @media (max-width: 640px) {
            .app-container { padding: 1rem; }
            .movies-grid { gap: 1rem; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
            .logo-text { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <div class="logo-area">
            <svg class="logo-svg" width="48" height="48" viewBox="0 0 100 100" fill="none">
                <rect width="100" height="100" rx="20" fill="#c026d3"/>
                <text x="50" y="68" font-size="46" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-weight="bold">UV</text>
            </svg>
            <span class="logo-text">UV's Movie World</span>
        </div>
        <div class="badge">✨ Cinematic Experience ✨</div>
    </div>

    <div class="search-wrapper">
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search movies or TV shows...">
            <button id="searchBtn">🔍 Search</button>
        </div>
        <div class="categories" id="categoriesContainer">
            <div class="cat-btn active" data-type="movie" data-cat="trending">🔥 Trending</div>
            <div class="cat-btn" data-type="movie" data-cat="popular">⭐ Popular</div>
            <div class="cat-btn" data-type="movie" data-cat="top_rated">🏆 Top Rated</div>
            <div class="cat-btn" data-type="tv" data-cat="trending">📺 TV Series</div>
        </div>
    </div>

    <!-- Server Selector Dropdown -->
    <div class="server-selector">
        <label>🎥 Streaming Server:</label>
        <select id="serverSelect">
            <option value="vidsrc">VidSrc (Default)</option>
            <option value="2embed">2Embed</option>
            <option value="autoembed">AutoEmbed</option>
            <option value="vidfast">VidFast</option>
        </select>
    </div>

    <div id="moviesContainer">
        <div class="loading-spinner">🎬 Loading cinematic universe...</div>
    </div>

    <div id="playerSection" class="player-section">
        <div class="player-card">
            <div class="player-header">
                <div id="playerTitle"></div>
                <button class="close-player" id="closePlayerBtn">✕ Close Player</button>
            </div>
            <div id="episodeSelector" class="episode-selector" style="display: none;"></div>
            <div class="video-wrapper" id="videoWrapper"></div>
            <div id="currentServerInfo" style="font-size:0.7rem; margin-top:10px; text-align:center; color:#c084fc;"></div>
        </div>
    </div>

    <footer>⚡ Powered by TMDB · Multi-Server Streaming · Ad-Free Experience ⚡</footer>
</div>

<script>
    // ========== TMDB API ==========
    const TMDB_API_KEY = "8af9b49a95ed3ebb5d577d1e0bdfb868";
    const IMG_BASE = "https://image.tmdb.org/t/p/w300";

    // ========== Embed Server Mapping ==========
    const EMBED_SERVERS = {
        vidsrc: {
            movie: (id) => `https://vidsrc.xyz/embed/movie/${id}`,
            tv: (id, season, episode) => `https://vidsrc.xyz/embed/tv/${id}/${season}/${episode}`
        },
        '2embed': {
            movie: (id) => `https://2embed.cc/embed/movie/${id}`,
            tv: (id, season, episode) => `https://2embed.cc/embed/tv/${id}/${season}/${episode}`
        },
        autoembed: {
            movie: (id) => `https://autoembed.co/movie/${id}`,
            tv: (id, season, episode) => `https://autoembed.co/tv/${id}/${season}/${episode}`
        },
        vidfast: {
            movie: (id) => `https://vidfast.app/movie/${id}`,
            tv: (id, season, episode) => `https://vidfast.app/tv/${id}/${season}/${episode}`
        }
    };

    // ========== App State ==========
    let currentMediaType = "movie";
    let currentCategory = "trending";
    let currentPage = 1;
    let isLoading = false;
    let hasMore = true;
    let currentPlayingItem = null;
    let currentSeason = null, currentEpisode = null;

    // ========== Helper Functions ==========
    async function tmdbFetch(endpoint) {
        const url = `https://api.themoviedb.org/3/${endpoint}&api_key=${TMDB_API_KEY}`;
        const response = await fetch(url);
        if (!response.ok) throw new Error(`TMDB Error: ${response.status}`);
        return response.json();
    }

    function getCurrentEmbedUrl(id, type, season = null, episode = null) {
        const selectedServer = document.getElementById('serverSelect').value;
        const server = EMBED_SERVERS[selectedServer];
        if (!server) return EMBED_SERVERS.vidsrc[type](id, season, episode);
        if (type === 'movie') return server.movie(id);
        if (type === 'tv') return server.tv(id, season, episode);
        return '';
    }

    function loadEmbed(id, type, title, season = null, episode = null) {
        const embedUrl = getCurrentEmbedUrl(id, type, season, episode);
        const iframeHtml = `<iframe src="${embedUrl}" referrerpolicy="no-referrer" allowfullscreen allow="autoplay; encrypted-media" frameborder="0"></iframe>`;
        document.getElementById('videoWrapper').innerHTML = iframeHtml;
        const serverName = document.getElementById('serverSelect').options[document.getElementById('serverSelect').selectedIndex].text;
        document.getElementById('currentServerInfo').innerHTML = `🎬 Now playing on ${serverName} · Powered by ${embedUrl}`;
    }

    function showPlayer(titleText) {
        document.getElementById('playerSection').style.display = 'block';
        document.getElementById('moviesContainer').style.display = 'none';
        document.getElementById('playerTitle').innerHTML = `🎬 ${titleText}`;
    }

    async function playMovie(id, title) {
        currentPlayingItem = { type: 'movie', id, title };
        showPlayer(title);
        loadEmbed(id, 'movie', title);
        localStorage.setItem('resumeWatching', JSON.stringify({ type: 'movie', id, title, timestamp: Date.now() }));
    }

    function playTVSeries(id, title) {
        currentPlayingItem = { type: 'tv', id, title };
        showEpisodeSelector(id, title);
    }

    function showEpisodeSelector(tvId, title) {
        document.getElementById('playerSection').style.display = 'block';
        document.getElementById('moviesContainer').style.display = 'none';
        document.getElementById('playerTitle').innerHTML = `📺 ${title}`;
        const epDiv = document.getElementById('episodeSelector');
        epDiv.style.display = 'flex';
        epDiv.innerHTML = `
            <span style="color:#e879f9;">Season:</span> <select id="seasonSelect"><option value="1">1</option></select>
            <span style="color:#e879f9;">Episode:</span> <select id="episodeSelect"><option value="1">1</option></select>
            <button id="playEpBtn" style="background:#c026d3; border:none; padding:0.3rem 1rem; border-radius:2rem; color:white; cursor:pointer;">▶ Play</button>
        `;
        fetch(`https://api.themoviedb.org/3/tv/${tvId}?api_key=${TMDB_API_KEY}`)
            .then(res => res.json())
            .then(data => {
                if (data.number_of_seasons) {
                    const sSelect = document.getElementById('seasonSelect');
                    sSelect.innerHTML = '';
                    for (let i = 1; i <= Math.min(data.number_of_seasons, 6); i++) {
                        const opt = document.createElement('option');
                        opt.value = i; opt.textContent = `Season ${i}`;
                        sSelect.appendChild(opt);
                    }
                    updateEpisodeSelect(1);
                    sSelect.onchange = () => updateEpisodeSelect(parseInt(sSelect.value));
                }
            });
        document.getElementById('playEpBtn').onclick = () => {
            const s = document.getElementById('seasonSelect').value;
            const e = document.getElementById('episodeSelect').value;
            currentSeason = s; currentEpisode = e;
            showPlayer(`${title} · S${s}E${e}`);
            loadEmbed(tvId, 'tv', title, s, e);
            localStorage.setItem('resumeWatching', JSON.stringify({ type: 'tv', id: tvId, title, season: s, episode: e, timestamp: Date.now() }));
        };
    }

    function updateEpisodeSelect(season) {
        const epSelect = document.getElementById('episodeSelect');
        epSelect.innerHTML = '';
        for (let i = 1; i <= 15; i++) {
            const opt = document.createElement('option');
            opt.value = i; opt.textContent = `Episode ${i}`;
            epSelect.appendChild(opt);
        }
    }

    // ========== Infinite Scroll & Content Loading ==========
    async function loadContent(reset = true) {
        if (reset) {
            currentPage = 1;
            hasMore = true;
            document.getElementById('moviesContainer').innerHTML = '';
        }
        if (isLoading || !hasMore) return;
        isLoading = true;

        let endpoint = '';
        if (currentMediaType === 'movie') {
            if (currentCategory === 'trending') endpoint = `trending/movie/week?page=${currentPage}`;
            else if (currentCategory === 'popular') endpoint = `movie/popular?page=${currentPage}`;
            else endpoint = `movie/top_rated?page=${currentPage}`;
        } else {
            if (currentCategory === 'trending') endpoint = `trending/tv/week?page=${currentPage}`;
            else if (currentCategory === 'popular') endpoint = `tv/popular?page=${currentPage}`;
            else endpoint = `tv/top_rated?page=${currentPage}`;
        }

        try {
            const data = await tmdbFetch(endpoint);
            const results = data.results || [];
            if (results.length === 0) hasMore = false;
            appendItems(results);
            currentPage++;
        } catch (e) {
            console.error("Load error:", e);
            hasMore = false;
        }
        isLoading = false;
    }

    function appendItems(items) {
        let container = document.getElementById('moviesContainer');
        let grid = container.querySelector('.movies-grid');
        if (!grid) {
            grid = document.createElement('div');
            grid.className = 'movies-grid';
            container.appendChild(grid);
        }
        items.forEach(item => {
            const title = item.title || item.name;
            const poster = item.poster_path ? IMG_BASE + item.poster_path : 'https://placehold.co/300x450/1e1a2e/a855f7?text=No+Image';
            const year = item.release_date ? item.release_date.split('-')[0] : (item.first_air_date ? item.first_air_date.split('-')[0] : 'N/A');
            const card = document.createElement('div');
            card.className = 'movie-card';
            card.onclick = () => {
                if (currentMediaType === 'movie') playMovie(item.id, title);
                else playTVSeries(item.id, title);
            };
            card.innerHTML = `<img src="${poster}" alt="${title}" loading="lazy"><div class="info"><h3>${title}</h3><p>${year}</p></div>`;
            grid.appendChild(card);
        });
    }

    // ========== Top 10 Carousel ==========
    async function loadTop10() {
        try {
            const data = await tmdbFetch(`trending/movie/week?page=1`);
            const movies = data.results.slice(0, 10);
            const container = document.getElementById('moviesContainer');
            const top10Section = document.createElement('div');
            top10Section.className = 'top10-section';
            top10Section.innerHTML = `<div class="section-title" style="font-size:1.2rem; margin-bottom:1rem; color:#e879f9;">🏆 Top 10 This Week</div><div class="carousel" id="top10Carousel" style="display:flex; gap:1rem; overflow-x:auto; margin-bottom:2rem;"></div>`;
            const carousel = top10Section.querySelector('#top10Carousel');
            movies.forEach(movie => {
                const div = document.createElement('div');
                div.className = 'carousel-item';
                div.style.minWidth = '150px';
                div.style.background = 'rgba(0,0,0,0.5)';
                div.style.borderRadius = '0.8rem';
                div.style.overflow = 'hidden';
                div.style.cursor = 'pointer';
                div.onclick = () => playMovie(movie.id, movie.title);
                div.innerHTML = `<img src="${movie.poster_path ? IMG_BASE + movie.poster_path : 'https://placehold.co/300x450'}" style="width:100%; aspect-ratio:2/3; object-fit:cover;"><div style="padding:0.5rem; text-align:center;"><h4 style="font-size:0.8rem;">${movie.title}</h4></div>`;
                carousel.appendChild(div);
            });
            container.prepend(top10Section);
        } catch(e) { console.error("Top10 failed"); }
    }

    // ========== Search ==========
    document.getElementById('searchBtn').addEventListener('click', async () => {
        const query = document.getElementById('searchInput').value.trim();
        if (!query) return;
        const endpoint = `search/${currentMediaType === 'movie' ? 'movie' : 'tv'}?query=${encodeURIComponent(query)}&page=1`;
        const data = await tmdbFetch(endpoint);
        const container = document.getElementById('moviesContainer');
        container.innerHTML = '';
        const grid = document.createElement('div');
        grid.className = 'movies-grid';
        data.results.forEach(item => {
            const title = item.title || item.name;
            const poster = item.poster_path ? IMG_BASE + item.poster_path : '';
            const card = document.createElement('div');
            card.className = 'movie-card';
            card.onclick = () => {
                if (currentMediaType === 'movie') playMovie(item.id, title);
                else playTVSeries(item.id, title);
            };
            card.innerHTML = `<img src="${poster}"><div class="info"><h3>${title}</h3></div>`;
            grid.appendChild(card);
        });
        container.appendChild(grid);
    });

    // ========== Category Switching ==========
    function attachCategoryEvents() {
        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentMediaType = btn.getAttribute('data-type');
                currentCategory = btn.getAttribute('data-cat');
                currentPage = 1; hasMore = true;
                document.getElementById('moviesContainer').innerHTML = '';
                loadTop10();
                loadContent(true);
            });
        });
    }

    // ========== Infinite Scroll Observer ==========
    function setupInfiniteScroll() {
        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting && !isLoading && hasMore) {
                loadContent(false);
            }
        }, { threshold: 0.1 });
        const sentinel = document.createElement('div');
        sentinel.style.height = '20px';
        document.getElementById('moviesContainer').appendChild(sentinel);
        observer.observe(sentinel);
    }

    // ========== Event Listeners ==========
    document.getElementById('closePlayerBtn').addEventListener('click', () => {
        document.getElementById('playerSection').style.display = 'none';
        document.getElementById('moviesContainer').style.display = 'block';
        document.getElementById('videoWrapper').innerHTML = '';
    });
    document.getElementById('serverSelect').addEventListener('change', () => {
        if (currentPlayingItem) {
            if (currentPlayingItem.type === 'movie') playMovie(currentPlayingItem.id, currentPlayingItem.title);
            else if (currentPlayingItem.type === 'tv' && currentSeason && currentEpisode) {
                loadEmbed(currentPlayingItem.id, 'tv', currentPlayingItem.title, currentSeason, currentEpisode);
            }
        }
    });

    let resumeData = JSON.parse(localStorage.getItem('resumeWatching')) || null;
    if (resumeData && confirm(`Resume watching "${resumeData.title}"?`)) {
        if (resumeData.type === 'movie') playMovie(resumeData.id, resumeData.title);
        else if (resumeData.type === 'tv') playTVSeries(resumeData.id, resumeData.title);
    }

    // ========== Initialize ==========
    loadTop10();
    loadContent(true);
    attachCategoryEvents();
    setupInfiniteScroll();
</script>
</body>
</html>
