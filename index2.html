<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>UV's Movie World · Stream Movies, TV & Anime</title>
    <meta name="description" content="Watch latest movies, TV series, and anime online in HD. Fast servers, Hindi dubbed, ambient mode.">
    <meta name="theme-color" content="#0a0f1e">
    <!-- Favicon: yellow background, black UV -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23FFD700'/%3E%3Ctext x='50' y='68' font-size='48' text-anchor='middle' fill='black' font-family='Arial' font-weight='bold'%3EUV%3C/text%3E%3C/svg%3E">
    <script src="https://cdn.jsdelivr.net/npm/colorthief@2.3.2/dist/color-thief.umd.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Poppins', system-ui, 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0b1120 0%, #03060f 100%);
            min-height: 100vh;
            color: #f0f3fa;
            transition: background-color 0.3s;
        }

        .ambient-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            transition: background 0.5s ease;
            pointer-events: none;
        }

        .glass-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(15, 25, 45, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            border: 1px solid rgba(255,215,0,0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            padding: 1.5rem;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(255,215,0,0.2);
            padding-bottom: 1rem;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo svg {
            width: 48px;
            height: 48px;
            filter: drop-shadow(0 0 4px gold);
        }
        .logo-text {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .controls {
            display: flex;
            gap: 12px;
        }
        .ambient-toggle, .speed-test-btn {
            background: rgba(255,215,0,0.15);
            border: 1px solid rgba(255,215,0,0.4);
            color: #FFD700;
            padding: 0.3rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s;
        }
        .ambient-toggle:hover, .speed-test-btn:hover {
            background: rgba(255,215,0,0.3);
        }

        .search-section {
            margin-bottom: 2rem;
        }
        .search-bar {
            display: flex;
            gap: 0.8rem;
            background: rgba(0,0,0,0.6);
            border-radius: 3rem;
            padding: 0.2rem;
            border: 1px solid rgba(255,215,0,0.3);
        }
        .search-bar input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 0.9rem 1.5rem;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        .search-bar button {
            background: linear-gradient(95deg, #FFD700, #FFA500);
            border: none;
            padding: 0 1.8rem;
            border-radius: 3rem;
            font-weight: bold;
            color: #0b1120;
            cursor: pointer;
        }
        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-top: 1.2rem;
        }
        .cat-btn {
            background: rgba(255,215,0,0.1);
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
            border: 1px solid rgba(255,215,0,0.2);
        }
        .cat-btn.active, .cat-btn:hover {
            background: #FFD700;
            color: #0b1120;
            border-color: #FFD700;
        }

        .top10-container {
            margin-bottom: 2rem;
        }
        .section-title {
            font-size: 1.4rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #FFD700;
        }
        .carousel {
            display: flex;
            gap: 1rem;
            overflow-x: auto;
            scroll-behavior: smooth;
            padding-bottom: 0.5rem;
        }
        .carousel-item {
            min-width: 160px;
            background: rgba(0,0,0,0.6);
            border-radius: 1rem;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid rgba(255,215,0,0.3);
        }
        .carousel-item:hover {
            transform: scale(1.02);
            box-shadow: 0 0 12px rgba(255,215,0,0.4);
        }
        .carousel-item img {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
        }
        .carousel-item .info {
            padding: 0.5rem;
            text-align: center;
        }

        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
        }
        .movie-card {
            background: rgba(20, 30, 55, 0.7);
            backdrop-filter: blur(6px);
            border-radius: 1.2rem;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.25s ease;
            border: 1px solid rgba(255,215,0,0.2);
            position: relative;
        }
        .movie-card:hover {
            transform: translateY(-6px);
            border-color: #FFD700;
            box-shadow: 0 10px 20px -5px rgba(0,0,0,0.6);
        }
        .movie-card img {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
        }
        .movie-card .info {
            padding: 0.7rem;
        }
        .movie-card .info h3 {
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #FFD700;
        }
        .hindi-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #e67e22;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            z-index: 2;
        }

        .player-section {
            margin-top: 2rem;
            display: none;
        }
        .player-glass {
            background: rgba(0,0,0,0.85);
            border-radius: 1.5rem;
            padding: 1rem;
            backdrop-filter: blur(20px);
            border: 1px solid #FFD700;
        }
        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 1rem;
            gap: 10px;
        }
        .server-switch {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .server-btn, .lang-btn {
            background: #1e2a3a;
            border: none;
            color: white;
            padding: 0.3rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
            font-size: 0.7rem;
        }
        .server-btn.active, .lang-btn.active {
            background: #FFD700;
            color: black;
        }
        .close-player {
            background: #e74c3c;
            border: none;
            color: white;
            padding: 0.3rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
        }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            border-radius: 1rem;
            overflow: hidden;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .episode-selector {
            margin-bottom: 1rem;
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .loading-spinner {
            text-align: center;
            padding: 2rem;
            color: #FFD700;
        }

        footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.7rem;
            opacity: 0.7;
        }

        @media (max-width: 640px) {
            .glass-wrapper { padding: 1rem; }
            .movies-grid { gap: 0.8rem; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
        }
    </style>
</head>
<body>
<div id="ambientOverlay" class="ambient-overlay"></div>
<div class="glass-wrapper">
    <div class="header">
        <div class="logo">
            <svg width="48" height="48" viewBox="0 0 100 100">
                <rect width="100" height="100" rx="20" fill="#FFD700"/>
                <text x="50" y="68" font-size="46" text-anchor="middle" fill="black" font-family="Arial" font-weight="bold">UV</text>
            </svg>
            <span class="logo-text">UV's Movie World</span>
        </div>
        <div class="controls">
            <button class="ambient-toggle" id="ambientToggle">🌙 Ambient On</button>
            <button class="speed-test-btn" id="speedTestBtn">⚡ Auto Fastest Server</button>
        </div>
    </div>

    <div class="search-section">
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search movies, TV shows, anime...">
            <button id="searchBtn">🔍</button>
        </div>
        <div class="categories" id="categoriesContainer">
            <div class="cat-btn active" data-type="movie" data-cat="trending">🔥 Trending</div>
            <div class="cat-btn" data-type="movie" data-cat="popular">⭐ Popular</div>
            <div class="cat-btn" data-type="movie" data-cat="top_rated">🏆 Top Rated</div>
            <div class="cat-btn" data-type="tv" data-cat="trending">📺 TV Series</div>
            <div class="cat-btn" data-type="anime" data-cat="trending">🎌 Anime</div>
        </div>
    </div>

    <div class="top10-container" id="top10Container">
        <div class="section-title">🏆 Top 10 This Week</div>
        <div class="carousel" id="top10Carousel"></div>
    </div>

    <div id="moviesContainer">
        <div class="loading-spinner">🎬 Loading...</div>
    </div>

    <div id="playerSection" class="player-section">
        <div class="player-glass">
            <div class="player-header">
                <div id="playerTitle" style="font-weight:bold;"></div>
                <div>
                    <button class="lang-btn" id="langToggleBtn">🇮🇳 Hindi Dubbed</button>
                    <div class="server-switch" id="serverSwitch"></div>
                </div>
                <button class="close-player" id="closePlayerBtn">✕ Close</button>
            </div>
            <div id="episodeSelector" class="episode-selector" style="display: none;"></div>
            <div class="video-wrapper" id="videoWrapper"></div>
            <div id="currentServerInfo" style="font-size:0.7rem; margin-top:8px; text-align:center; color:#FFD700;"></div>
        </div>
    </div>

    <footer>⚠️ DISCLAIMER: We do not host any videos. All streams are embedded from third-party servers. DMCA complaints should be sent to embed providers.</footer>
</div>

<script>
    const TMDB_API_KEY = "8af9b49a95ed3ebb5d577d1e0bdfb868";
    const IMG_BASE = "https://image.tmdb.org/t/p/w300";

    const PROVIDERS = {
        movie: {
            original: [
                "https://vidsrc.xyz/embed/movie/{id}",
                "https://2embed.cc/embed/movie/{id}",
                "https://primeplay.me/embed/movie/{id}",
                "https://www.vidking.net/embed/movie/{id}",
                "https://embed.su/embed/movie/{id}",
                "https://movieninja.xyz/embed/movie/{id}"
            ],
            hindi: [
                "https://vidsrc.xyz/embed/movie/{id}?hindi",
                "https://hindimovies.xyz/embed/movie/{id}",
                "https://www.hindilinks4u.to/embed/{id}",
                "https://moviehindi.net/embed/{id}",
                "https://vidsrc.cc/embed/movie/{id}?lang=hi"
            ]
        },
        tv: {
            original: [
                "https://vidsrc.xyz/embed/tv/{id}/{s}/{e}",
                "https://2embed.cc/embed/tv/{id}/{s}/{e}",
                "https://primeplay.me/embed/tv/{id}/{s}/{e}",
                "https://www.vidking.net/embed/tv/{id}/{s}/{e}"
            ],
            hindi: [
                "https://vidsrc.xyz/embed/tv/{id}/{s}/{e}?hindi",
                "https://hindiseries.xyz/embed/tv/{id}/{s}/{e}",
                "https://www.hindilinks4u.to/embed/tv/{id}/{s}/{e}"
            ]
        },
        anime: {
            original: [
                "https://gogoanime.ee/embed/{id}",
                "https://zoro.to/embed/{id}",
                "https://animepahe.ru/embed/{id}",
                "https://allanime.site/embed/{id}"
            ],
            hindi: [
                "https://animehindime.xyz/embed/{id}",
                "https://hindianime.xyz/embed/{id}"
            ]
        }
    };

    function embedUrl(template, id, season = null, episode = null) {
        let url = template.replace("{id}", id);
        if (season !== null && episode !== null) {
            url = url.replace("{s}", season).replace("{e}", episode);
        }
        return url;
    }

    let currentMediaType = "movie";
    let currentCategory = "trending";
    let currentPage = 1;
    let isLoading = false;
    let hasMore = true;
    let currentPlayingItem = null;
    let currentServerUrls = [];
    let currentServerIndex = 0;
    let isHindiMode = false;
    let currentSeason = null, currentEpisode = null;
    let resumeData = JSON.parse(localStorage.getItem('resumeWatching')) || null;

    async function findFastestServer(urls) {
        const results = await Promise.any(urls.map(async (url, idx) => {
            const start = performance.now();
            try {
                await fetch(url, { method: 'HEAD', mode: 'no-cors', cache: 'no-store' });
                const duration = performance.now() - start;
                return { idx, duration, url };
            } catch(e) {
                return { idx, duration: Infinity, url };
            }
        }).catch(() => []));
        if (results && results.idx !== undefined) return results.idx;
        return 0;
    }

    async function autoSwitchFastest() {
        if (!currentServerUrls.length) return;
        const fastestIdx = await findFastestServer(currentServerUrls);
        if (fastestIdx !== currentServerIndex) {
            currentServerIndex = fastestIdx;
            loadEmbed(currentServerIndex);
            updateServerButtons();
        }
    }

    // *************** REMOVED SANDBOX ***************
    function loadEmbed(index) {
        const url = currentServerUrls[index];
        const iframeHtml = `<iframe src="${url}" referrerpolicy="no-referrer" allowfullscreen allow="autoplay; encrypted-media" frameborder="0"></iframe>`;
        document.getElementById('videoWrapper').innerHTML = iframeHtml;
        document.getElementById('currentServerInfo').innerHTML = `🔗 Server ${index+1} · ${new URL(url).hostname}`;
    }

    function updateServerButtons() {
        const container = document.getElementById('serverSwitch');
        container.innerHTML = '';
        currentServerUrls.forEach((_, idx) => {
            const btn = document.createElement('button');
            btn.textContent = `Server ${idx+1}`;
            btn.className = `server-btn ${idx === currentServerIndex ? 'active' : ''}`;
            btn.onclick = () => {
                currentServerIndex = idx;
                loadEmbed(idx);
                document.querySelectorAll('.server-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            };
            container.appendChild(btn);
        });
    }

    async function playMovie(id, title) {
        currentPlayingItem = { type: 'movie', id, title };
        const providers = isHindiMode ? PROVIDERS.movie.hindi : PROVIDERS.movie.original;
        currentServerUrls = providers.map(p => embedUrl(p, id));
        currentServerIndex = 0;
        showPlayer(title);
        loadEmbed(0);
        updateServerButtons();
        await autoSwitchFastest();
        localStorage.setItem('resumeWatching', JSON.stringify({ type: 'movie', id, title, timestamp: Date.now() }));
        fetchPosterAndAmbient(id, 'movie');
    }

    function playTVSeries(id, title) {
        currentPlayingItem = { type: 'tv', id, title };
        showEpisodeSelector(id, title);
    }

    function playAnime(id, title) {
        currentPlayingItem = { type: 'anime', id, title };
        const providers = isHindiMode ? PROVIDERS.anime.hindi : PROVIDERS.anime.original;
        currentServerUrls = providers.map(p => embedUrl(p, id));
        currentServerIndex = 0;
        showPlayer(title);
        loadEmbed(0);
        updateServerButtons();
        autoSwitchFastest();
        localStorage.setItem('resumeWatching', JSON.stringify({ type: 'anime', id, title, timestamp: Date.now() }));
        fetchPosterAndAmbient(id, 'tv');
    }

    function showEpisodeSelector(tvId, title) {
        document.getElementById('playerSection').style.display = 'block';
        document.getElementById('moviesContainer').style.display = 'none';
        document.getElementById('playerTitle').innerHTML = `📺 ${title}`;
        const epDiv = document.getElementById('episodeSelector');
        epDiv.style.display = 'flex';
        epDiv.innerHTML = `
            <span>Season:</span> <select id="seasonSelect"><option value="1">1</option><option value="2">2</option><option value="3">3</option></select>
            <span>Episode:</span> <select id="episodeSelect"><option value="1">1</option></select>
            <button id="playEpBtn">▶ Play</button>
        `;
        fetch(`https://api.themoviedb.org/3/tv/${tvId}?api_key=${TMDB_API_KEY}`)
            .then(res => res.json())
            .then(data => {
                if (data.number_of_seasons) {
                    const sSelect = document.getElementById('seasonSelect');
                    sSelect.innerHTML = '';
                    for (let i = 1; i <= Math.min(data.number_of_seasons, 10); i++) {
                        const opt = document.createElement('option');
                        opt.value = i;
                        opt.textContent = `Season ${i}`;
                        sSelect.appendChild(opt);
                    }
                    updateEpisodeSelect(1);
                    sSelect.onchange = () => updateEpisodeSelect(parseInt(sSelect.value));
                }
            });
        document.getElementById('playEpBtn').onclick = () => {
            const s = document.getElementById('seasonSelect').value;
            const e = document.getElementById('episodeSelect').value;
            currentSeason = s; currentEpisode = e;
            const providers = isHindiMode ? PROVIDERS.tv.hindi : PROVIDERS.tv.original;
            currentServerUrls = providers.map(p => embedUrl(p, tvId, s, e));
            currentServerIndex = 0;
            showPlayer(`${title} · S${s}E${e}`);
            loadEmbed(0);
            updateServerButtons();
            autoSwitchFastest();
            localStorage.setItem('resumeWatching', JSON.stringify({ type: 'tv', id: tvId, title, season: s, episode: e, timestamp: Date.now() }));
        };
    }

    function updateEpisodeSelect(season) {
        const epSelect = document.getElementById('episodeSelect');
        epSelect.innerHTML = '';
        for (let i = 1; i <= 20; i++) {
            const opt = document.createElement('option');
            opt.value = i;
            opt.textContent = `Episode ${i}`;
            epSelect.appendChild(opt);
        }
    }

    function showPlayer(titleText) {
        document.getElementById('playerSection').style.display = 'block';
        document.getElementById('moviesContainer').style.display = 'none';
        document.getElementById('playerTitle').innerHTML = `🎬 ${titleText}`;
        document.getElementById('episodeSelector').style.display = 'none';
    }

    function fetchPosterAndAmbient(id, type) {
        const endpoint = type === 'movie' ? `https://api.themoviedb.org/3/movie/${id}` : `https://api.themoviedb.org/3/tv/${id}`;
        fetch(`${endpoint}?api_key=${TMDB_API_KEY}`)
            .then(res => res.json())
            .then(data => {
                if (data.poster_path) {
                    const imgUrl = IMG_BASE + data.poster_path;
                    setAmbientColor(imgUrl);
                }
            });
    }

    let ambientEnabled = true;
    const colorThief = new ColorThief();
    function setAmbientColor(imageUrl) {
        if (!ambientEnabled) return;
        const img = new Image();
        img.crossOrigin = 'Anonymous';
        img.src = imageUrl;
        img.onload = () => {
            try {
                const color = colorThief.getColor(img);
                const bgColor = `rgb(${color[0]}, ${color[1]}, ${color[2]})`;
                document.getElementById('ambientOverlay').style.background = `radial-gradient(circle at 50% 30%, ${bgColor}30, #020408)`;
            } catch(e) {}
        };
    }

    function setupInfiniteScroll() {
        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting && !isLoading && hasMore) {
                loadContent(false);
            }
        }, { threshold: 0.1 });
        const sentinel = document.createElement('div');
        sentinel.style.height = '20px';
        document.getElementById('moviesContainer').appendChild(sentinel);
        observer.observe(sentinel);
    }

    async function loadContent(reset = true) {
        if (reset) {
            currentPage = 1;
            hasMore = true;
            document.getElementById('moviesContainer').innerHTML = '';
        }
        if (isLoading || !hasMore) return;
        isLoading = true;
        let endpoint = '';
        if (currentMediaType === 'anime') {
            endpoint = `https://api.themoviedb.org/3/trending/tv/week?page=${currentPage}`;
        } else if (currentMediaType === 'movie') {
            if (currentCategory === 'trending') endpoint = `https://api.themoviedb.org/3/trending/movie/week?page=${currentPage}`;
            else if (currentCategory === 'popular') endpoint = `https://api.themoviedb.org/3/movie/popular?page=${currentPage}`;
            else endpoint = `https://api.themoviedb.org/3/movie/top_rated?page=${currentPage}`;
        } else if (currentMediaType === 'tv') {
            if (currentCategory === 'trending') endpoint = `https://api.themoviedb.org/3/trending/tv/week?page=${currentPage}`;
            else if (currentCategory === 'popular') endpoint = `https://api.themoviedb.org/3/tv/popular?page=${currentPage}`;
            else endpoint = `https://api.themoviedb.org/3/tv/top_rated?page=${currentPage}`;
        }
        try {
            const data = await (await fetch(`${endpoint}&api_key=${TMDB_API_KEY}`)).json();
            const results = data.results || [];
            if (results.length === 0) hasMore = false;
            appendItems(results);
            currentPage++;
        } catch(e) { console.error(e); }
        isLoading = false;
    }

    function appendItems(items) {
        let container = document.getElementById('moviesContainer');
        let grid = container.querySelector('.movies-grid');
        if (!grid) {
            grid = document.createElement('div');
            grid.className = 'movies-grid';
            container.appendChild(grid);
        }
        items.forEach(item => {
            const title = item.title || item.name;
            const poster = item.poster_path ? IMG_BASE + item.poster_path : 'https://placehold.co/300x450/1e1e2a/white?text=No+Image';
            const year = item.release_date ? item.release_date.split('-')[0] : (item.first_air_date ? item.first_air_date.split('-')[0] : '');
            const isHindi = item.spoken_languages ? item.spoken_languages.some(l => l.iso_639_1 === 'hi') : false;
            const card = document.createElement('div');
            card.className = 'movie-card';
            card.onclick = () => {
                if (currentMediaType === 'movie') playMovie(item.id, title);
                else if (currentMediaType === 'tv') playTVSeries(item.id, title);
                else if (currentMediaType === 'anime') playAnime(item.id, title);
            };
            card.innerHTML = `
                ${isHindi ? '<div class="hindi-badge">हिंदी</div>' : ''}
                <img src="${poster}" alt="${title}" loading="lazy">
                <div class="info"><h3>${title}</h3><p>${year}</p></div>
            `;
            grid.appendChild(card);
        });
    }

    async function loadTop10() {
        const data = await (await fetch(`https://api.themoviedb.org/3/trending/movie/week?api_key=${TMDB_API_KEY}`)).json();
        const movies = data.results.slice(0, 10);
        const carousel = document.getElementById('top10Carousel');
        carousel.innerHTML = '';
        movies.forEach(movie => {
            const div = document.createElement('div');
            div.className = 'carousel-item';
            div.onclick = () => playMovie(movie.id, movie.title);
            div.innerHTML = `
                <img src="${movie.poster_path ? IMG_BASE + movie.poster_path : 'https://placehold.co/300x450'}" alt="${movie.title}">
                <div class="info"><h4>${movie.title}</h4></div>
            `;
            carousel.appendChild(div);
        });
    }

    function attachCategoryEvents() {
        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentMediaType = btn.getAttribute('data-type');
                currentCategory = btn.getAttribute('data-cat');
                currentPage = 1;
                hasMore = true;
                document.getElementById('moviesContainer').innerHTML = '';
                if (currentMediaType === 'anime') {
                    document.getElementById('top10Container').style.display = 'none';
                } else {
                    document.getElementById('top10Container').style.display = 'block';
                    loadTop10();
                }
                loadContent(true);
            });
        });
    }

    document.getElementById('searchBtn').addEventListener('click', async () => {
        const query = document.getElementById('searchInput').value;
        if (!query) return;
        let url = '';
        if (currentMediaType === 'movie') url = `https://api.themoviedb.org/3/search/movie?query=${query}&api_key=${TMDB_API_KEY}`;
        else if (currentMediaType === 'tv') url = `https://api.themoviedb.org/3/search/tv?query=${query}&api_key=${TMDB_API_KEY}`;
        else url = `https://api.themoviedb.org/3/search/tv?query=${query}&with_genres=16&api_key=${TMDB_API_KEY}`;
        const data = await (await fetch(url)).json();
        const container = document.getElementById('moviesContainer');
        container.innerHTML = '';
        const grid = document.createElement('div');
        grid.className = 'movies-grid';
        data.results.forEach(item => {
            const title = item.title || item.name;
            const poster = item.poster_path ? IMG_BASE + item.poster_path : '';
            const card = document.createElement('div');
            card.className = 'movie-card';
            card.onclick = () => {
                if (currentMediaType === 'movie') playMovie(item.id, title);
                else if (currentMediaType === 'tv') playTVSeries(item.id, title);
                else playAnime(item.id, title);
            };
            card.innerHTML = `<img src="${poster}"><div class="info"><h3>${title}</h3></div>`;
            grid.appendChild(card);
        });
        container.appendChild(grid);
    });

    document.getElementById('langToggleBtn').addEventListener('click', () => {
        isHindiMode = !isHindiMode;
        document.getElementById('langToggleBtn').style.background = isHindiMode ? '#e67e22' : '';
        if (currentPlayingItem) {
            if (currentPlayingItem.type === 'movie') playMovie(currentPlayingItem.id, currentPlayingItem.title);
            else if (currentPlayingItem.type === 'tv' && currentSeason && currentEpisode) {
                const providers = isHindiMode ? PROVIDERS.tv.hindi : PROVIDERS.tv.original;
                currentServerUrls = providers.map(p => embedUrl(p, currentPlayingItem.id, currentSeason, currentEpisode));
                currentServerIndex = 0;
                loadEmbed(0);
                updateServerButtons();
                autoSwitchFastest();
            } else if (currentPlayingItem.type === 'anime') playAnime(currentPlayingItem.id, currentPlayingItem.title);
        }
    });

    document.getElementById('closePlayerBtn').addEventListener('click', () => {
        document.getElementById('playerSection').style.display = 'none';
        document.getElementById('moviesContainer').style.display = 'block';
        document.getElementById('videoWrapper').innerHTML = '';
    });

    document.getElementById('ambientToggle').addEventListener('click', () => {
        ambientEnabled = !ambientEnabled;
        if (!ambientEnabled) document.getElementById('ambientOverlay').style.background = '';
    });
    document.getElementById('speedTestBtn').addEventListener('click', () => {
        if (currentServerUrls.length) autoSwitchFastest();
    });

    if (resumeData && confirm(`Resume watching "${resumeData.title}"?`)) {
        if (resumeData.type === 'movie') playMovie(resumeData.id, resumeData.title);
        else if (resumeData.type === 'tv') playTVSeries(resumeData.id, resumeData.title);
        else if (resumeData.type === 'anime') playAnime(resumeData.id, resumeData.title);
    }

    loadTop10();
    loadContent(true);
    attachCategoryEvents();
    setupInfiniteScroll();
</script>
</body>
</html>
