<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>UV's Movie World · Stream Movies & TV</title>
    <meta name="description" content="Watch latest movies and TV series online in HD. A sleek, neon-lit streaming experience with ambient mode.">
    <meta name="theme-color" content="#0a0f1e">
    <!-- Favicon: yellow background, black UV -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23FFD700'/%3E%3Ctext x='50' y='68' font-size='48' text-anchor='middle' fill='black' font-family='Arial' font-weight='bold'%3EUV%3C/text%3E%3C/svg%3E">
    <!-- Color Thief for Ambient Mode -->
    <script src="https://cdn.jsdelivr.net/npm/colorthief@2.3.2/dist/color-thief.umd.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, 'Poppins', sans-serif;
        }

        /* --- Greyish/Funk & Neon Theme --- */
        body {
            background: linear-gradient(145deg, #0f1219 0%, #080a10 100%);
            min-height: 100vh;
            color: #e0e4f0;
            transition: background-color 0.3s ease;
        }

        /* Ambient Overlay */
        .ambient-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            transition: background 0.5s ease;
            pointer-events: none;
        }

        /* Glassmorphism Wrapper with Neon Border */
        .glass-wrapper {
            max-width: 1400px;
            margin: 2rem auto;
            background: rgba(18, 22, 35, 0.7);
            backdrop-filter: blur(16px);
            border-radius: 2rem;
            border: 1px solid rgba(0, 255, 255, 0.25);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.1), 0 20px 40px rgba(0,0,0,0.5);
            padding: 1.8rem;
            transition: all 0.3s ease;
        }

        /* Header with Neon Text */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(0, 255, 255, 0.3);
            padding-bottom: 1rem;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo svg {
            width: 48px;
            height: 48px;
            filter: drop-shadow(0 0 6px cyan);
        }
        .logo-text {
            font-size: 1.9rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #4dfffc, #00aaff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 0 5px rgba(0,255,255,0.3);
        }
        .controls {
            display: flex;
            gap: 12px;
        }
        .ambient-toggle {
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid rgba(0, 255, 255, 0.5);
            color: #00ffff;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        .ambient-toggle:hover {
            background: rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 8px cyan;
        }

        /* Search Bar with Neon Accent */
        .search-section {
            margin-bottom: 2rem;
        }
        .search-bar {
            display: flex;
            gap: 0.8rem;
            background: rgba(10, 14, 23, 0.8);
            border-radius: 3rem;
            padding: 0.2rem;
            border: 1px solid rgba(0, 255, 255, 0.4);
            transition: box-shadow 0.2s;
        }
        .search-bar:focus-within {
            box-shadow: 0 0 12px cyan;
        }
        .search-bar input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 0.9rem 1.5rem;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        .search-bar button {
            background: linear-gradient(95deg, #00ffff, #0088ff);
            border: none;
            padding: 0 1.8rem;
            border-radius: 3rem;
            font-weight: bold;
            color: #0a0f1e;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .search-bar button:hover {
            transform: scale(1.02);
            filter: brightness(1.05);
        }

        /* Categories - Active Neon Effect */
        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-top: 1.2rem;
        }
        .cat-btn {
            background: rgba(0, 255, 255, 0.1);
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
            border: 1px solid rgba(0, 255, 255, 0.3);
            color: #ccf4ff;
        }
        .cat-btn.active, .cat-btn:hover {
            background: #00ffff;
            color: #0a0f1e;
            border-color: #00ffff;
            box-shadow: 0 0 10px cyan;
            font-weight: bold;
        }

        /* Top 10 Carousel */
        .top10-container {
            margin-bottom: 2rem;
        }
        .section-title {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #00ffff;
            text-shadow: 0 0 3px cyan;
        }
        .carousel {
            display: flex;
            gap: 1.2rem;
            overflow-x: auto;
            scroll-behavior: smooth;
            padding-bottom: 0.8rem;
        }
        .carousel-item {
            min-width: 170px;
            background: rgba(0,0,0,0.5);
            border-radius: 1rem;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(0, 255, 255, 0.4);
        }
        .carousel-item:hover {
            transform: translateY(-5px);
            border-color: cyan;
            box-shadow: 0 0 15px rgba(0,255,255,0.4);
        }
        .carousel-item img {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
        }
        .carousel-item .info {
            padding: 0.6rem;
            text-align: center;
        }

        /* Infinite Scroll Grid */
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1.8rem;
            margin-top: 1rem;
        }
        .movie-card {
            background: rgba(20, 26, 45, 0.7);
            backdrop-filter: blur(6px);
            border-radius: 1.2rem;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.25s ease;
            border: 1px solid rgba(0, 255, 255, 0.2);
            position: relative;
        }
        .movie-card:hover {
            transform: translateY(-8px);
            border-color: #00ffff;
            box-shadow: 0 10px 25px -5px rgba(0,255,255,0.3);
        }
        .movie-card img {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
        }
        .movie-card .info {
            padding: 0.8rem;
        }
        .movie-card .info h3 {
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #00ffff;
        }

        /* Player Section - Sleek & Clean */
        .player-section {
            margin-top: 2rem;
            display: none;
        }
        .player-glass {
            background: rgba(10, 14, 23, 0.95);
            border-radius: 1.5rem;
            padding: 1.2rem;
            backdrop-filter: blur(20px);
            border: 1px solid #00ffff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
        }
        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 1rem;
            gap: 12px;
        }
        #playerTitle {
            font-size: 1.2rem;
            font-weight: bold;
            color: #00ffff;
        }
        .lang-btn, .close-player {
            background: #1e2a3a;
            border: 1px solid cyan;
            color: white;
            padding: 0.3rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s;
        }
        .lang-btn.active {
            background: #00ffff;
            color: black;
            font-weight: bold;
        }
        .close-player {
            background: rgba(220, 20, 60, 0.8);
            border-color: crimson;
        }
        .close-player:hover {
            background: crimson;
        }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            border-radius: 1rem;
            overflow: hidden;
            background: #000;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .episode-selector {
            margin-bottom: 1rem;
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .loading-spinner {
            text-align: center;
            padding: 2rem;
            color: #00ffff;
        }
        footer {
            text-align: center;
            margin-top: 2.5rem;
            font-size: 0.7rem;
            opacity: 0.7;
            color: #aaa;
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1e2c;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #00ffff;
            border-radius: 10px;
        }

        @media (max-width: 640px) {
            .glass-wrapper { margin: 1rem; padding: 1rem; }
            .movies-grid { gap: 1rem; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
            .carousel-item { min-width: 130px; }
            .logo-text { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
<div id="ambientOverlay" class="ambient-overlay"></div>
<div class="glass-wrapper">
    <div class="header">
        <div class="logo">
            <svg width="48" height="48" viewBox="0 0 100 100">
                <rect width="100" height="100" rx="20" fill="#FFD700"/>
                <text x="50" y="68" font-size="46" text-anchor="middle" fill="black" font-family="Arial" font-weight="bold">UV</text>
            </svg>
            <span class="logo-text">UV's Movie World</span>
        </div>
        <div class="controls">
            <button class="ambient-toggle" id="ambientToggle">🌙 Ambient Mode</button>
        </div>
    </div>

    <div class="search-section">
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search movies or TV shows...">
            <button id="searchBtn">🔍 Search</button>
        </div>
        <div class="categories" id="categoriesContainer">
            <div class="cat-btn active" data-type="movie" data-cat="trending">🔥 Trending</div>
            <div class="cat-btn" data-type="movie" data-cat="popular">⭐ Popular</div>
            <div class="cat-btn" data-type="movie" data-cat="top_rated">🏆 Top Rated</div>
            <div class="cat-btn" data-type="tv" data-cat="trending">📺 TV Series</div>
        </div>
    </div>

    <div class="top10-container" id="top10Container">
        <div class="section-title">🏆 Top 10 This Week</div>
        <div class="carousel" id="top10Carousel"></div>
    </div>

    <div id="moviesContainer">
        <div class="loading-spinner">🎬 Loading cinematic experience...</div>
    </div>

    <div id="playerSection" class="player-section">
        <div class="player-glass">
            <div class="player-header">
                <div id="playerTitle"></div>
                <div>
                    <button class="lang-btn" id="langToggleBtn">🇮🇳 Hindi Dubbed</button>
                    <button class="close-player" id="closePlayerBtn">✕ Close Player</button>
                </div>
            </div>
            <div id="episodeSelector" class="episode-selector" style="display: none;"></div>
            <div class="video-wrapper" id="videoWrapper"></div>
            <div id="currentServerInfo" style="font-size:0.7rem; margin-top:10px; text-align:center; color:#00ffff;"></div>
        </div>
    </div>

    <footer>⚡ Powered by TMDB · Streaming via Vidking · Ambient Experience ⚡</footer>
</div>

<script>
    // =================== TMDB CONFIGURATION ===================
    const TMDB_API_KEY = "8af9b49a95ed3ebb5d577d1e0bdfb868";
    const IMG_BASE = "https://image.tmdb.org/t/p/w300";

    // =================== SINGLE VIDKING SERVER ===================
    function getVidkingUrl(id, type, season = null, episode = null) {
        if (type === 'movie') {
            return `https://www.vidking.net/embed/movie/${id}`;
        } else if (type === 'tv') {
            return `https://www.vidking.net/embed/tv/${id}/${season}/${episode}`;
        }
        return '';
    }

    // =================== APPLICATION STATE ===================
    let currentMediaType = "movie";
    let currentCategory = "trending";
    let currentPage = 1;
    let isLoading = false;
    let hasMore = true;
    let currentPlayingItem = null;
    let isHindiMode = false;
    let currentSeason = null, currentEpisode = null;
    let resumeData = JSON.parse(localStorage.getItem('resumeWatching')) || null;

    // Ambient Mode State
    let ambientEnabled = true;
    const colorThief = new ColorThief();

    // =================== TMDB API HELPER ===================
    async function tmdbFetch(endpoint) {
        const url = `https://api.themoviedb.org/3/${endpoint}&api_key=${TMDB_API_KEY}`;
        const response = await fetch(url);
        if (!response.ok) throw new Error(`TMDB Error: ${response.status}`);
        return response.json();
    }

    // =================== AMBIENT MODE (Auto on Play) ===================
    function setAmbientColorFromPoster(posterUrl) {
        if (!ambientEnabled) return;
        const img = new Image();
        img.crossOrigin = 'Anonymous';
        img.src = posterUrl;
        img.onload = () => {
            try {
                const dominantColor = colorThief.getColor(img);
                const overlay = document.getElementById('ambientOverlay');
                overlay.style.background = `radial-gradient(circle at 50% 30%, rgba(${dominantColor[0]}, ${dominantColor[1]}, ${dominantColor[2]}, 0.4), #020408 90%)`;
            } catch(e) { console.warn("Ambient color extraction failed"); }
        };
    }

    async function applyAmbientForItem(id, type) {
        try {
            let endpoint = type === 'movie' ? `movie/${id}` : `tv/${id}`;
            let data = await tmdbFetch(endpoint);
            if (data.poster_path) {
                setAmbientColorFromPoster(IMG_BASE + data.poster_path);
            }
        } catch(e) {}
    }

    // =================== PLAYER LOGIC (Single Vidking Server) ===================
    function loadEmbed(mediaId, type, title, season = null, episode = null) {
        const embedUrl = getVidkingUrl(mediaId, type, season, episode);
        const iframeHtml = `<iframe src="${embedUrl}" referrerpolicy="no-referrer" allowfullscreen allow="autoplay; encrypted-media" frameborder="0"></iframe>`;
        document.getElementById('videoWrapper').innerHTML = iframeHtml;
        document.getElementById('currentServerInfo').innerHTML = `🎬 Streaming via Vidking · ${new URL(embedUrl).hostname}`;
        // Activate ambient mode with the movie's poster
        applyAmbientForItem(mediaId, type);
    }

    function showPlayer(titleText) {
        document.getElementById('playerSection').style.display = 'block';
        document.getElementById('moviesContainer').style.display = 'none';
        document.getElementById('playerTitle').innerHTML = `🎬 ${titleText}`;
    }

    async function playMovie(id, title) {
        currentPlayingItem = { type: 'movie', id, title };
        showPlayer(title);
        loadEmbed(id, 'movie', title);
        localStorage.setItem('resumeWatching', JSON.stringify({ type: 'movie', id, title, timestamp: Date.now() }));
    }

    function playTVSeries(id, title) {
        currentPlayingItem = { type: 'tv', id, title };
        showEpisodeSelector(id, title);
    }

    function showEpisodeSelector(tvId, title) {
        document.getElementById('playerSection').style.display = 'block';
        document.getElementById('moviesContainer').style.display = 'none';
        document.getElementById('playerTitle').innerHTML = `📺 ${title}`;
        const epDiv = document.getElementById('episodeSelector');
        epDiv.style.display = 'flex';
        epDiv.innerHTML = `
            <span style="color:#0ff;">Season:</span> <select id="seasonSelect"><option value="1">1</option><option value="2">2</option></select>
            <span style="color:#0ff;">Episode:</span> <select id="episodeSelect"><option value="1">1</option></select>
            <button id="playEpBtn" style="background:cyan; border:none; padding:0.3rem 1rem; border-radius:2rem; color:black;">▶ Play</button>
        `;
        // Fetch actual seasons (simplified but works)
        fetch(`https://api.themoviedb.org/3/tv/${tvId}?api_key=${TMDB_API_KEY}`)
            .then(res => res.json())
            .then(data => {
                if (data.number_of_seasons) {
                    const sSelect = document.getElementById('seasonSelect');
                    sSelect.innerHTML = '';
                    for (let i = 1; i <= Math.min(data.number_of_seasons, 8); i++) {
                        const opt = document.createElement('option');
                        opt.value = i; opt.textContent = `Season ${i}`;
                        sSelect.appendChild(opt);
                    }
                    updateEpisodeSelect(1);
                    sSelect.onchange = () => updateEpisodeSelect(parseInt(sSelect.value));
                }
            });
        document.getElementById('playEpBtn').onclick = () => {
            const s = document.getElementById('seasonSelect').value;
            const e = document.getElementById('episodeSelect').value;
            currentSeason = s; currentEpisode = e;
            showPlayer(`${title} · S${s}E${e}`);
            loadEmbed(tvId, 'tv', title, s, e);
            localStorage.setItem('resumeWatching', JSON.stringify({ type: 'tv', id: tvId, title, season: s, episode: e, timestamp: Date.now() }));
        };
    }

    function updateEpisodeSelect(season) {
        const epSelect = document.getElementById('episodeSelect');
        epSelect.innerHTML = '';
        for (let i = 1; i <= 20; i++) {
            const opt = document.createElement('option');
            opt.value = i; opt.textContent = `Episode ${i}`;
            epSelect.appendChild(opt);
        }
    }

    // =================== INFINITE SCROLL + CONTENT LOADING ===================
    async function loadContent(reset = true) {
        if (reset) {
            currentPage = 1;
            hasMore = true;
            document.getElementById('moviesContainer').innerHTML = '';
        }
        if (isLoading || !hasMore) return;
        isLoading = true;

        let endpoint = '';
        if (currentMediaType === 'movie') {
            if (currentCategory === 'trending') endpoint = `trending/movie/week?page=${currentPage}`;
            else if (currentCategory === 'popular') endpoint = `movie/popular?page=${currentPage}`;
            else endpoint = `movie/top_rated?page=${currentPage}`;
        } else {
            if (currentCategory === 'trending') endpoint = `trending/tv/week?page=${currentPage}`;
            else if (currentCategory === 'popular') endpoint = `tv/popular?page=${currentPage}`;
            else endpoint = `tv/top_rated?page=${currentPage}`;
        }

        try {
            const data = await tmdbFetch(endpoint);
            const results = data.results || [];
            if (results.length === 0) hasMore = false;
            appendItems(results);
            currentPage++;
        } catch (e) {
            console.error("Load error:", e);
            hasMore = false;
        }
        isLoading = false;
    }

    function appendItems(items) {
        let container = document.getElementById('moviesContainer');
        let grid = container.querySelector('.movies-grid');
        if (!grid) {
            grid = document.createElement('div');
            grid.className = 'movies-grid';
            container.appendChild(grid);
        }
        items.forEach(item => {
            const title = item.title || item.name;
            const poster = item.poster_path ? IMG_BASE + item.poster_path : 'https://placehold.co/300x450/1a1e2c/cyan?text=No+Image';
            const year = item.release_date ? item.release_date.split('-')[0] : (item.first_air_date ? item.first_air_date.split('-')[0] : 'N/A');
            const card = document.createElement('div');
            card.className = 'movie-card';
            card.onclick = () => {
                if (currentMediaType === 'movie') playMovie(item.id, title);
                else playTVSeries(item.id, title);
            };
            card.innerHTML = `<img src="${poster}" alt="${title}" loading="lazy"><div class="info"><h3>${title}</h3><p>${year}</p></div>`;
            grid.appendChild(card);
        });
    }

    // =================== TOP 10 CAROUSEL ===================
    async function loadTop10() {
        try {
            const data = await tmdbFetch(`trending/movie/week?page=1`);
            const movies = data.results.slice(0, 10);
            const carousel = document.getElementById('top10Carousel');
            carousel.innerHTML = '';
            movies.forEach(movie => {
                const div = document.createElement('div');
                div.className = 'carousel-item';
                div.onclick = () => playMovie(movie.id, movie.title);
                div.innerHTML = `<img src="${movie.poster_path ? IMG_BASE + movie.poster_path : 'https://placehold.co/300x450'}" alt="${movie.title}"><div class="info"><h4>${movie.title}</h4></div>`;
                carousel.appendChild(div);
            });
        } catch(e) { console.error("Top10 failed"); }
    }

    // =================== SEARCH FUNCTIONALITY ===================
    document.getElementById('searchBtn').addEventListener('click', async () => {
        const query = document.getElementById('searchInput').value.trim();
        if (!query) return;
        const endpoint = `search/${currentMediaType === 'movie' ? 'movie' : 'tv'}?query=${encodeURIComponent(query)}&page=1`;
        const data = await tmdbFetch(endpoint);
        const container = document.getElementById('moviesContainer');
        container.innerHTML = '';
        const grid = document.createElement('div');
        grid.className = 'movies-grid';
        data.results.forEach(item => {
            const title = item.title || item.name;
            const poster = item.poster_path ? IMG_BASE + item.poster_path : '';
            const card = document.createElement('div');
            card.className = 'movie-card';
            card.onclick = () => {
                if (currentMediaType === 'movie') playMovie(item.id, title);
                else playTVSeries(item.id, title);
            };
            card.innerHTML = `<img src="${poster}"><div class="info"><h3>${title}</h3></div>`;
            grid.appendChild(card);
        });
        container.appendChild(grid);
    });

    // =================== CATEGORY SWITCHING ===================
    function attachCategoryEvents() {
        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentMediaType = btn.getAttribute('data-type');
                currentCategory = btn.getAttribute('data-cat');
                currentPage = 1; hasMore = true;
                document.getElementById('moviesContainer').innerHTML = '';
                if (currentMediaType === 'movie') loadTop10();
                else document.getElementById('top10Container').style.display = 'none';
                loadContent(true);
            });
        });
    }

    // =================== INFINITE SCROLL OBSERVER ===================
    function setupInfiniteScroll() {
        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting && !isLoading && hasMore) {
                loadContent(false);
            }
        }, { threshold: 0.1 });
        const sentinel = document.createElement('div');
        sentinel.style.height = '20px';
        document.getElementById('moviesContainer').appendChild(sentinel);
        observer.observe(sentinel);
    }

    // =================== EVENT LISTENERS ===================
    document.getElementById('langToggleBtn').addEventListener('click', () => {
        isHindiMode = !isHindiMode;
        document.getElementById('langToggleBtn').classList.toggle('active', isHindiMode);
        alert(`Hindi mode ${isHindiMode ? 'enabled' : 'disabled'}. Refresh or reload movie for effect.`);
        if (currentPlayingItem && currentPlayingItem.type === 'movie') {
            playMovie(currentPlayingItem.id, currentPlayingItem.title);
        }
    });
    document.getElementById('closePlayerBtn').addEventListener('click', () => {
        document.getElementById('playerSection').style.display = 'none';
        document.getElementById('moviesContainer').style.display = 'block';
        document.getElementById('videoWrapper').innerHTML = '';
    });
    document.getElementById('ambientToggle').addEventListener('click', () => {
        ambientEnabled = !ambientEnabled;
        if (!ambientEnabled) document.getElementById('ambientOverlay').style.background = '';
        else document.getElementById('ambientOverlay').style.background = '';
    });
    if (resumeData && confirm(`Resume watching "${resumeData.title}"?`)) {
        if (resumeData.type === 'movie') playMovie(resumeData.id, resumeData.title);
        else if (resumeData.type === 'tv') playTVSeries(resumeData.id, resumeData.title);
    }

    // =================== INITIALIZATION ===================
    loadTop10();
    loadContent(true);
    attachCategoryEvents();
    setupInfiniteScroll();
</script>
</body>
</html>
