<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="UV's Movie World - Stream Movies, TV Shows & Anime for Free">
    <meta name="theme-color" content="#111112">
    <title>UV's Movie World · Stream Movies & TV Series</title>
    <!-- Inter & JetBrains Mono for a modern look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0c0c0f;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            color: #ededf2;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* ambient background overlay */
        .ambient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            transition: background 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            pointer-events: none;
            background: radial-gradient(circle at 20% 30%, #0f1722, #03060c);
        }

        /* main glassmorphic container */
        .app-wrapper {
            max-width: 1440px;
            margin: 0 auto;
            padding: 1.5rem 1.8rem;
            backdrop-filter: blur(4px);
        }

        /* header area */
        .brand {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1.2rem;
            margin-bottom: 2.5rem;
            border-bottom: 1px solid rgba(100, 108, 255, 0.25);
            padding-bottom: 1rem;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-svg {
            width: 46px;
            height: 46px;
            filter: drop-shadow(0 0 10px #6c63ff);
        }
        .logo-text {
            font-size: 1.9rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff, #a5b4fc, #6c63ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .badge {
            background: rgba(108, 99, 255, 0.18);
            backdrop-filter: blur(4px);
            border-radius: 40px;
            padding: 0.3rem 1rem;
            font-size: 0.75rem;
            border: 1px solid rgba(108, 99, 255, 0.4);
            color: #c7d2fe;
        }

        /* search bar */
        .search-block {
            margin-bottom: 2rem;
        }
        .search-group {
            display: flex;
            gap: 0.7rem;
            background: rgba(18, 20, 28, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 3rem;
            border: 1px solid rgba(108, 99, 255, 0.35);
            transition: all 0.2s;
        }
        .search-group:focus-within {
            border-color: #6c63ff;
            box-shadow: 0 0 14px rgba(108, 99, 255, 0.4);
        }
        .search-group input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 0.9rem 1.5rem;
            font-size: 1rem;
            color: #f1f5f9;
            outline: none;
        }
        .search-group button {
            background: linear-gradient(105deg, #6c63ff, #4f46e5);
            border: none;
            border-radius: 3rem;
            padding: 0 1.8rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: transform 0.15s, filter 0.2s;
        }
        .search-group button:hover {
            transform: scale(1.02);
            filter: brightness(1.05);
        }

        /* category chips */
        .category-strip {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin: 1.2rem 0 2rem;
        }
        .cat-chip {
            background: rgba(108, 99, 255, 0.1);
            border: 1px solid rgba(108, 99, 255, 0.3);
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .cat-chip.active, .cat-chip:hover {
            background: #6c63ff;
            color: #0a0a0f;
            border-color: #6c63ff;
            box-shadow: 0 0 10px rgba(108, 99, 255, 0.5);
        }

        /* server picker (modern) */
        .server-selector {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: rgba(16, 18, 28, 0.7);
            backdrop-filter: blur(12px);
            padding: 0.6rem 1.2rem;
            border-radius: 3rem;
            width: fit-content;
            margin-bottom: 2rem;
            border: 1px solid rgba(108, 99, 255, 0.3);
        }
        .server-selector label {
            font-weight: 500;
            font-size: 0.85rem;
            color: #a5b4fc;
        }
        #serverSelect {
            background: #1f1f2e;
            color: #f1f5f9;
            border: 1px solid #6c63ff;
            border-radius: 2rem;
            padding: 0.3rem 1rem;
            font-size: 0.85rem;
            cursor: pointer;
            outline: none;
        }

        /* infinite scroll grid */
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 1.8rem;
            margin: 1.8rem 0 2rem;
        }
        .movie-card {
            background: rgba(22, 24, 36, 0.75);
            backdrop-filter: blur(8px);
            border-radius: 1.2rem;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.25s ease;
            border: 1px solid rgba(108, 99, 255, 0.2);
        }
        .movie-card:hover {
            transform: translateY(-6px);
            border-color: #6c63ff;
            box-shadow: 0 15px 25px -12px rgba(0, 0, 0, 0.6);
        }
        .movie-card img {
            width: 100%;
            aspect-ratio: 2 / 3;
            object-fit: cover;
            display: block;
        }
        .movie-info {
            padding: 0.8rem;
        }
        .movie-info h3 {
            font-size: 0.9rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .movie-info p {
            font-size: 0.7rem;
            color: #a5b4fc;
            margin-top: 0.3rem;
        }

        /* player section */
        .player-area {
            margin-top: 2rem;
            display: none;
        }
        .player-card {
            background: rgba(8, 10, 18, 0.96);
            backdrop-filter: blur(28px);
            border-radius: 1.5rem;
            padding: 1rem;
            border: 1px solid #6c63ff;
            box-shadow: 0 25px 40px -12px black;
        }
        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-bottom: 1rem;
        }
        .player-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #c7d2fe;
        }
        .player-actions {
            display: flex;
            gap: 0.7rem;
            flex-wrap: wrap;
        }
        .server-btn, .lang-btn, .close-player {
            background: #1e293b;
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: 500;
            color: #e2e8f0;
            cursor: pointer;
            transition: 0.15s;
        }
        .server-btn.active, .lang-btn.active {
            background: #6c63ff;
            color: #0a0a0f;
        }
        .close-player {
            background: #b91c1c;
        }
        .video-frame {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            border-radius: 1rem;
            overflow: hidden;
            background: #000000;
        }
        .video-frame iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .episode-panel {
            margin-bottom: 1rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .loading-area {
            text-align: center;
            padding: 3rem;
            color: #a5b4fc;
        }
        footer {
            text-align: center;
            margin-top: 3rem;
            font-size: 0.7rem;
            opacity: 0.6;
            padding-bottom: 1rem;
        }

        @media (max-width: 640px) {
            .app-wrapper { padding: 1rem; }
            .movies-grid { gap: 1rem; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
            .logo-text { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
<div id="ambientLayer" class="ambient-bg"></div>
<div class="app-wrapper">
    <div class="brand">
        <div class="logo">
            <svg class="logo-svg" width="46" height="46" viewBox="0 0 100 100" fill="none">
                <rect width="100" height="100" rx="24" fill="#6c63ff"/>
                <text x="50" y="68" font-size="46" text-anchor="middle" fill="white" font-family="'Inter', sans-serif" font-weight="800">UV</text>
            </svg>
            <span class="logo-text">UV's Movie World</span>
        </div>
        <div class="badge">✨ 4K · MULTI‑SOURCE · INFINITE ✨</div>
    </div>

    <div class="search-block">
        <div class="search-group">
            <input type="text" id="searchInput" placeholder="Search movie or TV series..." autocomplete="off">
            <button id="searchBtn">⟳ Search</button>
        </div>
        <div class="category-strip" id="categoryContainer">
            <div class="cat-chip active" data-type="movie" data-cat="trending">🔥 Trending Movies</div>
            <div class="cat-chip" data-type="movie" data-cat="popular">⭐ Popular</div>
            <div class="cat-chip" data-type="movie" data-cat="top_rated">🏆 Top Rated</div>
            <div class="cat-chip" data-type="tv" data-cat="trending">📺 Trending TV</div>
        </div>
    </div>

    <!-- server selection bar -->
    <div class="server-selector">
        <label>🎬 Stream engine:</label>
        <select id="serverSelect">
            <option value="vidfast">VidFast (fastest)</option>
            <option value="vidlink">VidLink</option>
            <option value="vidsrcpm">VidSrc.pm</option>
            <option value="2embedskin">2Embed.skin</option>
            <option value="vidsrcto">VidSrc.to</option>
            <option value="vidsrccc">VidSrc.cc</option>
            <option value="2embedcc">2Embed.cc</option>
            <option value="autoembed">AutoEmbed.co</option>
            <option value="nontongo">Nontongo.win (Asian)</option>
        </select>
    </div>

    <!-- infinite scroll movie grid -->
    <div id="movieGridContainer">
        <div class="loading-area">🌀 Loading cinematic universe ...</div>
    </div>

    <!-- dynamic player panel -->
    <div id="playerPanel" class="player-area">
        <div class="player-card">
            <div class="player-header">
                <div class="player-title" id="playerTitle"></div>
                <div class="player-actions">
                    <button id="langDubbedBtn" class="lang-btn">🇮🇳 Hindi Dubbed</button>
                    <button id="closePlayerBtn" class="close-player">✕ Close</button>
                </div>
            </div>
            <div id="episodeWrapper" class="episode-panel" style="display: none;"></div>
            <div class="video-frame" id="videoFrame"></div>
            <div id="serverStatus" style="font-size: 0.7rem; margin-top: 8px; text-align: center; color: #8b9cf5;"></div>
        </div>
    </div>

    <footer>⚡ Data from TMDB · Embedded with multiple providers · No files are stored on this server</footer>
</div>

<script>
    // ==================== TMDB CONFIG ====================
    const TMDB_API_KEY = "8af9b49a95ed3ebb5d577d1e0bdfb868";
    const IMAGE_BASE = "https://image.tmdb.org/t/p/w300";

    // ---------- EMBED PROVIDERS (JUNE 2026 working list, based on official package) ----------
    // reference: https://www.npmjs.com/package/tmdb-embed-providers
    const PROVIDER_BUILDERS = {
        vidfast:  (id, type, season, episode) => type === 'movie' ? `https://vidfast.app/movie/${id}` : `https://vidfast.app/tv/${id}/${season}/${episode}`,
        vidlink:  (id, type, season, episode) => type === 'movie' ? `https://vidlink.pro/movie/${id}` : `https://vidlink.pro/tv/${id}/${season}/${episode}`,
        vidsrcpm: (id, type, season, episode) => type === 'movie' ? `https://vidsrc.pm/embed/movie/${id}` : `https://vidsrc.pm/embed/tv/${id}/${season}/${episode}`,
        '2embedskin': (id, type, season, episode) => type === 'movie' ? `https://2embed.skin/embed/movie/${id}` : `https://2embed.skin/embed/tv/${id}/${season}/${episode}`,
        vidsrcto: (id, type, season, episode) => type === 'movie' ? `https://vidsrc.to/embed/movie/${id}` : `https://vidsrc.to/embed/tv/${id}/${season}/${episode}`,
        vidsrccc: (id, type, season, episode) => type === 'movie' ? `https://vidsrc.cc/embed/movie/${id}` : `https://vidsrc.cc/embed/tv/${id}/${season}/${episode}`,
        '2embedcc': (id, type, season, episode) => type === 'movie' ? `https://2embed.cc/embed/movie/${id}` : `https://2embed.cc/embed/tv/${id}/${season}/${episode}`,
        autoembed: (id, type, season, episode) => type === 'movie' ? `https://autoembed.co/movie/${id}` : `https://autoembed.co/tv/${id}/${season}/${episode}`,
        nontongo:  (id, type, season, episode) => type === 'movie' ? `https://nontongo.win/movie/${id}` : `https://nontongo.win/tv/${id}/${season}/${episode}`
    };

    // ----- fallback extras (scraping simulation, but use real API if needed)
    const HINDI_EMBED_EXTRA = {
        movie: (id) => `https://hindimovies.xyz/embed/${id}`,
        tv: (id, s, e) => `https://hindiseries.xyz/embed/${id}/${s}/${e}`
    };

    // ========== GLOBAL STATE ==========
    let currentMediaType = "movie";        // 'movie' or 'tv'
    let currentCategory = "trending";
    let currentPage = 1;
    let isLoading = false;
    let hasMore = true;
    let currentPlayingItem = null;          // store current playing media
    let isHindiActive = false;
    let currentSeason = null, currentEpisode = null;
    let resumeData = JSON.parse(localStorage.getItem('resumeWatching')) || null;

    // ambient color thief (CDN)
    const colorThief = new ColorThief();
    let ambientEnabled = true;

    // ---------- Helper: TMDB fetch ----------
    async function tmdbRequest(endpoint) {
        const url = `https://api.themoviedb.org/3/${endpoint}&api_key=${TMDB_API_KEY}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error(`TMDB error ${res.status}`);
        return res.json();
    }

    // ---------- Dynamic poster ambient (when play starts) ----------
    async function applyAmbientFromPoster(movieId, mediaType) {
        if (!ambientEnabled) return;
        try {
            let detail = await tmdbRequest(`${mediaType === 'movie' ? `movie/${movieId}` : `tv/${movieId}`}`);
            if (detail.poster_path) {
                const imgUrl = IMAGE_BASE + detail.poster_path;
                const img = new Image();
                img.crossOrigin = 'Anonymous';
                img.src = imgUrl;
                img.onload = () => {
                    try {
                        const dominant = colorThief.getColor(img);
                        const overlay = document.getElementById('ambientLayer');
                        overlay.style.background = `radial-gradient(circle at 50% 35%, rgba(${dominant[0]}, ${dominant[1]}, ${dominant[2]}, 0.35), #020408 95%)`;
                    } catch(e) { console.warn("ambient color skip", e); }
                };
            }
        } catch(e) { console.warn("ambient fetch failed"); }
    }

    // ---------- GET embed URL based on current server selection + hindi toggles ----------
    function getEmbedUrl(tmdbId, type, season=null, episode=null) {
        let providerId = document.getElementById('serverSelect').value;
        let builder = PROVIDER_BUILDERS[providerId];
        if (!builder) builder = PROVIDER_BUILDERS.vidfast;
        let embed = builder(tmdbId, type, season, episode);
        // if hindi mode is active and we have a fallback hindi provider, attempt to override.
        if (isHindiActive && type === 'movie') {
            // optional: change embed to hindi-dedicated mirror (extra library)
            embed = `https://vidsrc.xyz/embed/movie/${tmdbId}?hindi`;  // many embed proxies accept hindi flag
        } else if (isHindiActive && type === 'tv' && season && episode) {
            embed = `https://vidsrc.xyz/embed/tv/${tmdbId}/${season}/${episode}?hindi`;
        }
        return embed;
    }

    function loadPlayerWithServer(mediaId, type, title, season=null, episode=null) {
        const embedUrl = getEmbedUrl(mediaId, type, season, episode);
        const iframeMarkup = `<iframe src="${embedUrl}" allowfullscreen allow="autoplay; encrypted-media" frameborder="0" referrerpolicy="no-referrer"></iframe>`;
        document.getElementById('videoFrame').innerHTML = iframeMarkup;
        const serverName = document.getElementById('serverSelect').options[document.getElementById('serverSelect').selectedIndex]?.text || 'VidFast';
        document.getElementById('serverStatus').innerHTML = `🎞️ streaming via ${serverName} — ${new URL(embedUrl).hostname}`;
    }

    // show player and hide grid
    function revealPlayer(contentTitle) {
        document.getElementById('playerPanel').style.display = 'block';
        document.getElementById('movieGridContainer').style.display = 'none';
        document.getElementById('playerTitle').innerHTML = `🎬 ${contentTitle}`;
        document.getElementById('episodeWrapper').style.display = 'none';
    }

    // MOVIE play
    async function startMovie(movieId, movieTitle) {
        currentPlayingItem = { type: 'movie', id: movieId, title: movieTitle };
        revealPlayer(movieTitle);
        loadPlayerWithServer(movieId, 'movie', movieTitle);
        localStorage.setItem('resumeWatching', JSON.stringify({ type: 'movie', id: movieId, title: movieTitle, timestamp: Date.now() }));
        applyAmbientFromPoster(movieId, 'movie');
    }

    // TV SERIES entry
    function prepareTvSeries(tvId, seriesTitle) {
        currentPlayingItem = { type: 'tv', id: tvId, title: seriesTitle };
        revealPlayer(seriesTitle);
        const epDiv = document.getElementById('episodeWrapper');
        epDiv.style.display = 'flex';
        epDiv.innerHTML = `
            <span style="color:#a5b4fc;">Season:</span> <select id="seasonSelect"><option value="1">1</option><option value="2">2</option></select>
            <span style="color:#a5b4fc;">Episode:</span> <select id="episodeSelect"><option value="1">1</option></select>
            <button id="playEpisodeBtn" style="background:#6c63ff; border:none; padding:0.3rem 1rem; border-radius:2rem; font-weight:600; cursor:pointer;">▶ Play</button>
        `;
        // fetch season count from tmdb
        fetch(`https://api.themoviedb.org/3/tv/${tvId}?api_key=${TMDB_API_KEY}`)
            .then(res => res.json())
            .then(data => {
                if (data.number_of_seasons) {
                    const sSelect = document.getElementById('seasonSelect');
                    sSelect.innerHTML = '';
                    for (let i = 1; i <= Math.min(data.number_of_seasons, 6); i++) {
                        const opt = document.createElement('option');
                        opt.value = i; opt.textContent = `Season ${i}`;
                        sSelect.appendChild(opt);
                    }
                    refreshEpisodeSelect(1);
                    sSelect.onchange = () => refreshEpisodeSelect(parseInt(sSelect.value));
                }
            });
        document.getElementById('playEpisodeBtn').onclick = () => {
            const season = document.getElementById('seasonSelect').value;
            const episode = document.getElementById('episodeSelect').value;
            currentSeason = season; currentEpisode = episode;
            loadPlayerWithServer(tvId, 'tv', `${seriesTitle} S${season}E${episode}`, season, episode);
            localStorage.setItem('resumeWatching', JSON.stringify({ type: 'tv', id: tvId, title: seriesTitle, season, episode, timestamp: Date.now() }));
            applyAmbientFromPoster(tvId, 'tv');
        };
    }
    function refreshEpisodeSelect(season) {
        const epSelect = document.getElementById('episodeSelect');
        epSelect.innerHTML = '';
        for (let i = 1; i <= 20; i++) {
            const opt = document.createElement('option');
            opt.value = i; opt.textContent = `Episode ${i}`;
            epSelect.appendChild(opt);
        }
    }

    // ========== INFINITE SCROLL + TMDB FETCH ==========
    async function fetchMovies(reset = true) {
        if (reset) {
            currentPage = 1;
            hasMore = true;
            document.getElementById('movieGridContainer').innerHTML = '';
        }
        if (isLoading || !hasMore) return;
        isLoading = true;

        let endpoint = '';
        if (currentMediaType === 'movie') {
            if (currentCategory === 'trending') endpoint = `trending/movie/week?page=${currentPage}`;
            else if (currentCategory === 'popular') endpoint = `movie/popular?page=${currentPage}`;
            else endpoint = `movie/top_rated?page=${currentPage}`;
        } else {
            if (currentCategory === 'trending') endpoint = `trending/tv/week?page=${currentPage}`;
            else if (currentCategory === 'popular') endpoint = `tv/popular?page=${currentPage}`;
            else endpoint = `tv/top_rated?page=${currentPage}`;
        }

        try {
            const data = await tmdbRequest(endpoint);
            const entries = data.results || [];
            if (entries.length === 0) hasMore = false;
            renderCards(entries);
            currentPage++;
        } catch(e) {
            console.error(e);
            hasMore = false;
        }
        isLoading = false;
    }

    function renderCards(items) {
        const container = document.getElementById('movieGridContainer');
        let grid = container.querySelector('.movies-grid');
        if (!grid) {
            grid = document.createElement('div');
            grid.className = 'movies-grid';
            container.appendChild(grid);
        }
        items.forEach(item => {
            const title = item.title || item.name;
            const poster = item.poster_path ? IMAGE_BASE + item.poster_path : 'https://placehold.co/300x450/1f1b2e/6c63ff?text=No+Poster';
            const year = item.release_date ? item.release_date.split('-')[0] : (item.first_air_date ? item.first_air_date.split('-')[0] : '???');
            const card = document.createElement('div');
            card.className = 'movie-card';
            card.onclick = () => {
                if (currentMediaType === 'movie') startMovie(item.id, title);
                else prepareTvSeries(item.id, title);
            };
            card.innerHTML = `<img src="${poster}" alt="${title}" loading="lazy"><div class="movie-info"><h3>${title}</h3><p>${year}</p></div>`;
            grid.appendChild(card);
        });
    }

    // infinite scroll observer
    function setupInfiniteScroll() {
        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting && !isLoading && hasMore) {
                fetchMovies(false);
            }
        }, { threshold: 0.2, rootMargin: "0px 0px 200px 0px" });
        const sentinel = document.createElement('div');
        sentinel.style.height = '30px';
        document.getElementById('movieGridContainer').appendChild(sentinel);
        observer.observe(sentinel);
    }

    // TOP 10 carousel on initial load
    async function loadTop10Preview() {
        try {
            const data = await tmdbRequest(`trending/movie/week?page=1`);
            const topMovies = data.results.slice(0, 8);
            const container = document.getElementById('movieGridContainer');
            const bannerDiv = document.createElement('div');
            bannerDiv.className = 'top10-banner';
            bannerDiv.style.marginBottom = '2rem';
            bannerDiv.innerHTML = `<div style="font-size:1.3rem; margin-bottom: 0.8rem;">🏆 Top Picks this week</div><div style="display:flex; gap:1rem; overflow-x:auto; padding-bottom:0.5rem;" id="top10Strip"></div>`;
            const strip = bannerDiv.querySelector('#top10Strip');
            topMovies.forEach(m => {
                const div = document.createElement('div');
                div.style.minWidth = '120px';
                div.style.cursor = 'pointer';
                div.style.backgroundColor = '#1f1b2e';
                div.style.borderRadius = '0.8rem';
                div.style.overflow = 'hidden';
                div.onclick = () => startMovie(m.id, m.title);
                div.innerHTML = `<img src="${m.poster_path ? IMAGE_BASE + m.poster_path : ''}" style="width:100%; aspect-ratio:2/3; object-fit:cover;"><div style="padding:6px; font-size:0.7rem; text-align:center;">${m.title}</div>`;
                strip.appendChild(div);
            });
            container.prepend(bannerDiv);
        } catch(e) { console.warn('top10 failed')}
    }

    // SEARCH
    document.getElementById('searchBtn').addEventListener('click', async () => {
        const query = document.getElementById('searchInput').value.trim();
        if (!query) return;
        const endpoint = `search/${currentMediaType === 'movie' ? 'movie' : 'tv'}?query=${encodeURIComponent(query)}&page=1`;
        const data = await tmdbRequest(endpoint);
        const container = document.getElementById('movieGridContainer');
        container.innerHTML = '';
        const freshGrid = document.createElement('div');
        freshGrid.className = 'movies-grid';
        data.results.forEach(item => {
            const title = item.title || item.name;
            const poster = item.poster_path ? IMAGE_BASE + item.poster_path : '';
            const card = document.createElement('div');
            card.className = 'movie-card';
            card.onclick = () => { currentMediaType === 'movie' ? startMovie(item.id, title) : prepareTvSeries(item.id, title); };
            card.innerHTML = `<img src="${poster}"><div class="movie-info"><h3>${title}</h3></div>`;
            freshGrid.appendChild(card);
        });
        container.appendChild(freshGrid);
    });

    // category toggles & reload
    function attachCategoryEvents() {
        const chips = document.querySelectorAll('.cat-chip');
        chips.forEach(chip => {
            chip.addEventListener('click', () => {
                chips.forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                currentMediaType = chip.getAttribute('data-type');
                currentCategory = chip.getAttribute('data-cat');
                currentPage = 1;
                hasMore = true;
                document.getElementById('movieGridContainer').innerHTML = '';
                loadTop10Preview();
                fetchMovies(true);
            });
        });
    }

    // ---------- Language Toggle & Server change watcher ----------
    document.getElementById('langDubbedBtn').addEventListener('click', () => {
        isHindiActive = !isHindiActive;
        const btn = document.getElementById('langDubbedBtn');
        btn.classList.toggle('active', isHindiActive);
        btn.style.background = isHindiActive ? '#e67e22' : '';
        if (currentPlayingItem) {
            if (currentPlayingItem.type === 'movie') startMovie(currentPlayingItem.id, currentPlayingItem.title);
            else if (currentPlayingItem.type === 'tv' && currentSeason && currentEpisode) {
                loadPlayerWithServer(currentPlayingItem.id, 'tv', currentPlayingItem.title, currentSeason, currentEpisode);
            }
        }
    });

    // when server dropdown changes, reload current content.
    document.getElementById('serverSelect').addEventListener('change', () => {
        if (currentPlayingItem) {
            if (currentPlayingItem.type === 'movie') startMovie(currentPlayingItem.id, currentPlayingItem.title);
            else if (currentPlayingItem.type === 'tv' && currentSeason && currentEpisode) {
                loadPlayerWithServer(currentPlayingItem.id, 'tv', currentPlayingItem.title, currentSeason, currentEpisode);
            } else if (currentPlayingItem.type === 'tv') {
                prepareTvSeries(currentPlayingItem.id, currentPlayingItem.title);
            }
        }
    });

    document.getElementById('closePlayerBtn').addEventListener('click', () => {
        document.getElementById('playerPanel').style.display = 'none';
        document.getElementById('movieGridContainer').style.display = 'block';
        document.getElementById('videoFrame').innerHTML = '';
    });

    // resume watching if possible
    if (resumeData && confirm(`▶️ Resume "${resumeData.title}"?`)) {
        if (resumeData.type === 'movie') startMovie(resumeData.id, resumeData.title);
        else if (resumeData.type === 'tv') prepareTvSeries(resumeData.id, resumeData.title);
    }

    // ---------- bootstrap ----------
    loadTop10Preview();
    fetchMovies(true);
    attachCategoryEvents();
    setupInfiniteScroll();
</script>
